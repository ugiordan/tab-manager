site_name: Tab Lifecycle Manager
site_url: https://ugiordan.github.io/tab-manager
repo_url: https://github.com/ugiordan/tab-manager
repo_name: ugiordan/tab-manager

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - glightbox:
      touchNavigation: true
      zoomable: true
      draggable: true
      effect: zoom
      width: "100%"

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/diagram-zoom.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
    - Configuration: getting-started/configuration.md
  - Architecture:
    - Overview: architecture/overview.md
    - Data Model: architecture/data-model.md
  - Components:
    - Chrome Extension: components/extension.md
    - Bridge Server: components/bridge.md
    - MCP Plugin: components/mcp.md
  - MCP Tools:
    - Tool Reference: mcp-tools/reference.md
  - API:
    - Bridge REST API: api/bridge-rest.md
